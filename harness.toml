# Harness default configuration

[loop]
engine = "native"
mode = "standard"
max_turns = 500
compaction_threshold = 0.80
human_approval = true
max_review_iterations = 5
# Autonomous mode selection: agent assesses task complexity and auto-selects
# engine + mode without user configuration
auto_mode = true
auto_mode_threshold = 0.6
auto_mode_llm_fallback = false

[sandbox]
runtime = "docker"

[repomap]
enabled = true

[cache]
warm_enabled = true

[observability]
backend = "none"
