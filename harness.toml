# Harness default configuration

[loop]
engine = "native"
mode = "standard"
max_turns = 500
compaction_threshold = 0.80
human_approval = true
max_review_iterations = 5
# Autonomous mode selection: agent assesses task complexity and auto-selects
# engine + mode without user configuration
auto_mode = true
auto_mode_threshold = 0.6
auto_mode_llm_fallback = false

[sandbox]
runtime = "docker"

[repomap]
enabled = false

[cache]
warm_enabled = false

[observability]
backend = "none"
# Langfuse connection (set backend = "langfuse" and configure below)
# langfuse_public_key = "pk-..."
# langfuse_secret_key = "sk-..."
# langfuse_host = "http://localhost:3000"
# Evaluation LLM (used by ragas metrics — cost-effective model recommended)
# eval_llm_provider = "openai"
# eval_llm_model = "gpt-4o-mini"
# eval_llm_api_key = "sk-..."
# eval_llm_api_base = ""
